version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: chainboard_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: chainboard
      POSTGRES_PASSWORD: chainboard_dev_pass
      POSTGRES_DB: chainboard_dev
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U chainboard -d chainboard_dev']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chainboard_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
