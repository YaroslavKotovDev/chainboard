# Fly.io configuration for ChainBoard API
# https://fly.io/docs/reference/configuration/

app    = "chainboard-api"
region = "iad"           # US East — closest to Base Sepolia RPC nodes

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT     = "4000"

[http_service]
  internal_port        = 4000
  force_https          = true
  auto_stop_machines   = true
  auto_start_machines  = true
  min_machines_running = 1
  processes            = ["app"]

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 500
    soft_limit = 400

[[vm]]
  cpu_kind = "shared"
  cpus     = 1
  memory   = "512mb"

[checks]
  [checks.api_health]
    grace_period = "10s"
    interval     = "30s"
    method       = "GET"
    path         = "/v1/health"
    port         = 4000
    protocol     = "http"
    timeout      = "5s"
    type         = "http"
