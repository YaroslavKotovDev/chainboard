# Fly.io configuration for the ChainBoard blockchain sync worker

app    = "chainboard-worker"
region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"

[processes]
  worker = "node dist/apps/api/src/worker.js"

[[vm]]
  cpu_kind = "shared"
  cpus     = 1
  memory   = "512mb"
